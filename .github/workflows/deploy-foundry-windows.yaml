# Create an updated deploy workflow file aimed at X:\shared-bastion exactly
from pathlib import Path

p = Path("/mnt/data/deploy-foundry-windows.yml")
p.write_text("""name: Deploy to self-hosted (Windows) — Foundry Module

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted]
    defaults:
      run:
        shell: powershell

    env:
      MODULE_DIR: 'X:\\shared-bastion'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show context (debug)
        run: |
          Write-Host "whoami=$(whoami)"
          Write-Host "hostname=$(hostname)"
          Write-Host "GITHUB_SHA=$env:GITHUB_SHA"
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Write-Host "MODULE_DIR=$env:MODULE_DIR"
          Get-ChildItem $env:GITHUB_WORKSPACE | Select-Object Name,Length,Mode

      - name: Ensure destination exists
        run: New-Item -ItemType Directory -Force -Path $env:MODULE_DIR | Out-Null

      - name: Sync repo into module folder (mirror; exclude .git/.github)
        id: sync
        run: |
          robocopy $env:GITHUB_WORKSPACE $env:MODULE_DIR /MIR /XD .git .github /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }

      - name: Done
        run: |
          Write-Host "Synced to $env:MODULE_DIR. If Foundry is open, use 'Reload Application' to see changes."
""", encoding="utf-8")

str(p)
